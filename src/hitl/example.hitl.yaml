version: "1"

# Telegram credentials are resolved from env vars TELEGRAM_BOT_TOKEN and
# TELEGRAM_CHAT_ID. They can also be set here, but env vars take precedence.
# telegram:
#   botToken: ""
#   chatId: ""

# Slack credentials are resolved from env vars SLACK_BOT_TOKEN, SLACK_CHANNEL_ID,
# and SLACK_SIGNING_SECRET. The interaction webhook port defaults to 3201.
# slack:
#   botToken: ""
#   channelId: ""
#   signingSecret: ""
#   interactionPort: 3201

policies:
  # Require approval before sending or deleting emails (via Telegram)
  - name: Email mutations
    description: All email-writing and deletion actions route to Telegram for operator approval.
    actions:
      - email.send
      - email.delete
      - email.forward
    approval:
      channel: telegram
      timeout: 300   # 5 minutes
      fallback: deny
    tags:
      - email
      - destructive

  # Any file-system write operation requires sign-off (via Slack)
  - name: File writes
    description: Write, edit, move, and delete file operations require human review via Slack.
    actions:
      - file.write
      - file.delete
      - file.move
      - file.rename
    approval:
      channel: slack
      timeout: 120   # 2 minutes
      fallback: deny
    tags:
      - filesystem
      - destructive

  # Auto-approve low-risk database reads after a brief window
  - name: Database reads (auto-approve)
    description: Read-only database queries are auto-approved after a short hold.
    actions:
      - db.select
      - db.count
    approval:
      channel: telegram
      timeout: 10
      fallback: auto-approve
    tags:
      - database
      - readonly

  # Catch-all: anything under the "payment" namespace always requires approval
  - name: Payment namespace
    description: Any action in the payment namespace requires explicit approval.
    actions:
      - payment.*
    approval:
      channel: slack
      timeout: 600   # 10 minutes
      fallback: deny
    tags:
      - payment
      - high-risk
